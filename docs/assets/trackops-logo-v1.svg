<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
    <defs>
        <linearGradient id="amberGrad" x1="0" y1="96" x2="0" y2="416" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#FBBF24" />
            <stop offset="50%" stop-color="#F59E0B" />
            <stop offset="100%" stop-color="#D97706" />
        </linearGradient>
        
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="16" result="blur" />
            <feComponentTransfer in="blur" result="glow">
                <feFuncA type="linear" slope="0.6"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode in="glow" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
            <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1" />
            <circle cx="0" cy="0" r="1.5" fill="#FFFFFF" fill-opacity="0.06" />
        </pattern>
    </defs>

    <rect width="512" height="512" rx="112" fill="#0A0A0A" />
    <rect width="512" height="512" rx="112" fill="url(#grid)" />

    <g filter="url(#glow)">
        <path d="M 116 96 L 196 176 L 276 256 L 196 336 L 116 416" stroke="url(#amberGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
        <line x1="316" y1="416" x2="396" y2="416" stroke="#22C55E" stroke-width="24" stroke-linecap="round" />
        <circle cx="276" cy="256" r="32" fill="#22C55E" />
    </g>

    <circle cx="116" cy="96" r="14" fill="#0A0A0A" stroke="url(#amberGrad)" stroke-width="8" />
    <circle cx="196" cy="176" r="14" fill="#0A0A0A" stroke="url(#amberGrad)" stroke-width="8" />
    
    <circle cx="276" cy="256" r="18" fill="#0A0A0A" />
    <circle cx="276" cy="256" r="10" fill="#22C55E" />
    
    <circle cx="196" cy="336" r="14" fill="#0A0A0A" stroke="url(#amberGrad)" stroke-width="8" />
    <circle cx="116" cy="416" r="14" fill="#0A0A0A" stroke="url(#amberGrad)" stroke-width="8" />
</svg>
