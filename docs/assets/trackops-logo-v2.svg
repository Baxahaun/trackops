<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>

    <!-- Amber Gradients for the 3D Cubes -->
    <linearGradient id="amberTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="amberLeft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="amberRight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#78350F"/>
    </linearGradient>

    <!-- Emerald Gradients for the Agent Core -->
    <linearGradient id="emeraldTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="emeraldLeft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="emeraldRight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#14532D"/>
    </linearGradient>

    <!-- Glow Effects -->
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur1" />
      <feGaussianBlur stdDeviation="30" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="floatShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="30" stdDeviation="20" flood-color="#000000" flood-opacity="0.9" />
    </filter>
  </defs>

  <!-- Dark Canvas -->
  <rect width="512" height="512" fill="url(#bgGrad)" rx="64"/>

  <!-- Centered Isometric Grid Floor -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1.5">
    <path d="M -100 256 L 612 256 M 256 -100 L 256 612" transform="matrix(0.866 0.5 -0.866 0.5 256 -50)"/>
    <path d="M -100 156 L 612 156 M 156 -100 L 156 612" transform="matrix(0.866 0.5 -0.866 0.5 256 -50)"/>
    <path d="M -100 356 L 612 356 M 356 -100 L 356 612" transform="matrix(0.866 0.5 -0.866 0.5 256 -50)"/>
    <path d="M -100 56 L 612 56 M 56 -100 L 56 612" transform="matrix(0.866 0.5 -0.866 0.5 256 -50)"/>
    <path d="M -100 456 L 612 456 M 456 -100 L 456 612" transform="matrix(0.866 0.5 -0.866 0.5 256 -50)"/>
  </g>

  <!-- 
  GROUP: Left Cube (Track / Data) 
  -->
  <g transform="translate(140, 240)" filter="url(#floatShadow)">
    <g transform="scale(0.8)">
      <!-- Left Face -->
      <path d="M 0 0 L 0 50 L -43.3 25 L -43.3 -25 Z" fill="url(#amberLeft)" />
      <!-- Right Face -->
      <path d="M 0 0 L 0 50 L 43.3 25 L 43.3 -25 Z" fill="url(#amberRight)" />
      <!-- Top Face -->
      <path d="M 0 0 L -43.3 -25 L 0 -50 L 43.3 -25 Z" fill="url(#amberTop)" />
      <!-- Top Face Circuit Overlay -->
      <path d="M 0 -15 L -20 -25 L 0 -35 L 20 -25 Z" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="2" />
    </g>
  </g>

  <!-- 
  GROUP: Right Cube (Ops / Infrastructure) 
  -->
  <g transform="translate(372, 240)" filter="url(#floatShadow)">
    <g transform="scale(0.8)">
      <path d="M 0 0 L 0 50 L -43.3 25 L -43.3 -25 Z" fill="url(#amberLeft)" />
      <path d="M 0 0 L 0 50 L 43.3 25 L 43.3 -25 Z" fill="url(#amberRight)" />
      <path d="M 0 0 L -43.3 -25 L 0 -50 L 43.3 -25 Z" fill="url(#amberTop)" />
      <path d="M 0 -15 L -20 -25 L 0 -35 L 20 -25 Z" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="2" />
    </g>
  </g>

  <!-- 
  GROUP: Bottom Cube (Storage / Base) 
  -->
  <g transform="translate(256, 360)" filter="url(#floatShadow)">
    <g transform="scale(0.8)">
      <path d="M 0 0 L 0 50 L -43.3 25 L -43.3 -25 Z" fill="url(#amberLeft)" />
      <path d="M 0 0 L 0 50 L 43.3 25 L 43.3 -25 Z" fill="url(#amberRight)" />
      <path d="M 0 0 L -43.3 -25 L 0 -50 L 43.3 -25 Z" fill="url(#amberTop)" />
      <path d="M 0 -15 L -20 -25 L 0 -35 L 20 -25 Z" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="2" />
    </g>
  </g>

  <!-- 
  Connection Streams (Energy Beams in Isometric Perspective) 
  -->
  <g stroke="url(#amberTop)" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 6">
    <!-- Left to Center -->
    <line x1="180" y1="216" x2="216" y2="196" />
    <line x1="180" y1="264" x2="226" y2="290" />
    <!-- Center to Right -->
    <line x1="296" y1="196" x2="332" y2="216" />
    <line x1="286" y1="290" x2="332" y2="264" />
    <!-- Center to Bottom -->
    <line x1="256" y1="230" x2="256" y2="300" />
  </g>

  <!-- 
  GROUP: Center Floating Gem / Agent Core
  Hovering high above the structure 
  -->
  <g transform="translate(256, 170)" filter="url(#floatShadow)">
    <g transform="scale(1.4)">
      <!-- Emerald Core -->
      <path d="M 0 0 L 0 50 L -43.3 25 L -43.3 -25 Z" fill="url(#emeraldLeft)" />
      <path d="M 0 0 L 0 50 L 43.3 25 L 43.3 -25 Z" fill="url(#emeraldRight)" />
      <path d="M 0 0 L -43.3 -25 L 0 -50 L 43.3 -25 Z" fill="url(#emeraldTop)" filter="url(#glowGreen)" />
      
      <!-- CLI Terminal Cutout mapped onto the Top Face (Isometric Projection) -->
      <g transform="matrix(0.866 0.5 -0.866 0.5 0 -25)">
        <!-- The '>_' prompt in true isometric scale inside the cube top face -->
        <path d="M -6 -10 L 4 0 L -6 10" fill="none" stroke="#101010" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
        <line x1="8" y1="10" x2="18" y2="10" stroke="#101010" stroke-width="3" stroke-linecap="round" />
      </g>
    </g>
  </g>

  <!-- 
  Subtle Orbital Ring crossing the Isometric Plane
  -->
  <g transform="matrix(0.866 0.5 -0.866 0.5 256 160)">
    <ellipse cx="0" cy="0" rx="90" ry="90" fill="none" stroke="#22C55E" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="10 15" filter="url(#glowGreen)" />
  </g>

</svg>
