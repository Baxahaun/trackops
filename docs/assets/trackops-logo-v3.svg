<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
    <defs>
        <!-- Gradients minimalistas y elegantes -->
        <linearGradient id="primaryAmber" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FBBF24" />
            <stop offset="100%" stop-color="#D97706" />
        </linearGradient>

        <linearGradient id="accentGreen" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#22C55E" />
            <stop offset="100%" stop-color="#16A34A" />
        </linearGradient>

        <linearGradient id="bgClean" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1A1A1A" />
            <stop offset="100%" stop-color="#0A0A0A" />
        </linearGradient>

        <!-- Sombra muy sutil para dar volumen sin romper el flat-design (Estilo Apple / Stripe) -->
        <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4" />
        </filter>
        
        <!-- Glow súper difuminado para el acento -->
        <filter id="neonSubtle" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Base limpia con bordes redondeados suaves -->
    <rect width="512" height="512" rx="112" fill="url(#bgClean)" />

    <!-- 
       CONCEPTO MINIMALISTA (El infinito lógico / Las vías de datos):
       Dos líneas geométricas perfectas e intersecadas que forman una abstracción 
       limpia de una T ("Track") que al mismo tiempo es el "pipe" de un sistema. 
       El punto verde representa el Agente/Ejecutable viajando por la vía. 
    -->

    <g transform="translate(256, 256)">
        
        <!-- Línea horizontal base (Ops / Track) -->
        <!-- Curvada hacia arriba en los extremos, como un cable o sonrisa estructural -->
        <path d="M -140 60 Q 0 90 140 60" fill="none" stroke="url(#primaryAmber)" stroke-width="40" stroke-linecap="round" filter="url(#softShadow)" />

        <!-- Línea vertical (La "T" principal y el cono de control) -->
        <!-- Cruza por detrás, sube verticalmente con grosor asimétrico -->
        <path d="M 0 60 L 0 -100" fill="none" stroke="url(#primaryAmber)" stroke-width="40" stroke-linecap="round" filter="url(#softShadow)" />
        
        <!-- Nodo "Cerebro" (Agente IA) en la cima de la T -->
        <!-- Círculo geométrico perfecto color esmeralda, que rompe la simetría -->
        <circle cx="0" cy="-140" r="32" fill="url(#accentGreen)" filter="url(#neonSubtle)" />
        <circle cx="0" cy="-140" r="16" fill="#0A0A0A" />

        <!-- Abstracción mini del Prompt CLI en el la base izquierda de la pista -->
        <path d="M -90 -20 L -60 10 L -90 40" fill="none" stroke="url(#accentGreen)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
        <line x1="-40" y1="40" x2="-10" y2="40" stroke="url(#accentGreen)" stroke-width="14" stroke-linecap="round" />

    </g>

</svg>
