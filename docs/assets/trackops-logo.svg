<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
    <defs>
        <!-- Gradients -->
        <linearGradient id="cyberCyan" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#06B6D4" /> <!-- Cyan-500 -->
            <stop offset="50%" stop-color="#3B82F6" /> <!-- Blue-500 -->
            <stop offset="100%" stop-color="#8B5CF6" /> <!-- Violet-500 -->
        </linearGradient>

        <linearGradient id="accentPink" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#EC4899" /> <!-- Pink-500 -->
            <stop offset="100%" stop-color="#F43F5E" /> <!-- Rose-500 -->
        </linearGradient>
        
        <linearGradient id="bgDeep" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#020617" /> <!-- Slate-950 -->
            <stop offset="100%" stop-color="#000000" /> 
        </linearGradient>

        <linearGradient id="wireframe" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#1E293B" />
            <stop offset="100%" stop-color="#0F172A" />
        </linearGradient>

        <!-- Glow Effect -->
        <filter id="hyperGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="24" result="blur1" />
            <feGaussianBlur stdDeviation="12" result="blur2" />
            <feGaussianBlur stdDeviation="4" result="blur3" />
            <feMerge>
                <feMergeNode in="blur1" />
                <feMergeNode in="blur2" />
                <feMergeNode in="blur3" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <!-- Sutil Sombra Inferior -->
        <filter id="bottomShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#000000" flood-opacity="0.8" />
        </filter>
    </defs>

    <!-- Canvas -->
    <rect width="512" height="512" rx="100" fill="url(#bgDeep)" />
    
    <!-- Malla base cósmica / Espacio de código infinito -->
    <g stroke="url(#wireframe)" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.6">
        <path d="M 0 128 Q 256 384 512 128" fill="none"/>
        <path d="M 0 256 Q 256 512 512 256" fill="none"/>
        <path d="M 0 384 Q 256 640 512 384" fill="none"/>
        
        <!-- Líneas verticales deformadas simulando lente curvo / horizonte de sucesos -->
        <path d="M 128 0 Q 128 256 64 512" fill="none"/>
        <path d="M 256 0 Q 256 256 256 512" fill="none"/>
        <path d="M 384 0 Q 384 256 448 512" fill="none"/>
    </g>

    <g transform="translate(256, 256)">
        
        <!-- 
        ========================================================
        METÁFORA:
        El ojo del observador (Ops) interceptado por el pulso 
        dinámico (El Agente / El Track).
        ========================================================
        -->

        <!-- Base: El "Lente" o Sistema de Tracking (El ojo técnico) -->
        <ellipse cx="0" cy="0" rx="140" ry="70" fill="none" stroke="#334155" stroke-width="4" filter="url(#bottomShadow)"/>
        <!-- Anillo interior segmentado de control -->
        <ellipse cx="0" cy="0" rx="120" ry="50" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="16 12 4 12"/>
        
        <!-- 
             El "Pulso" / El "Track":
             Una onda de energía que envuelve y fractura la visión estática.
             Es una "T" asimétrica, como el paso rápido de un agente ejecutando procesos.
        -->
        <path d="M -180 -40 
                 C -80 60, -20 -100, 0 -120 
                 C 20 -100, 80 60, 180 -40" 
              fill="none" stroke="url(#cyberCyan)" stroke-width="20" stroke-linecap="round" filter="url(#hyperGlow)"/>

        <!-- La espina central del "TrackOps": El conector descendente que cierra la "T" -->
        <path d="M 0 -10 
                 C 0 80, -30 140, 0 160" 
              fill="none" stroke="url(#accentPink)" stroke-width="18" stroke-linecap="round" filter="url(#hyperGlow)"/>

        <!-- 
             El "Agente" Singularidad:
             El ente inteligente orbitando en el centro exacto donde el Track (Pulso)
             y el Ops (Lente) se encuentran.
        -->
        <circle cx="0" cy="-10" r="16" fill="#FFFFFF" filter="url(#hyperGlow)"/>
        <!-- Halo estelar de la IA (brillo en estrella) -->
        <path d="M 0 -50 L 4 -22 L 32 -18 L 10 0 L 16 28 L -6 10 L -28 16 L -10 -2 L -18 -30 L 0 -12 Z" fill="url(#accentPink)" opacity="0.6" filter="url(#hyperGlow)"/>
        
    </g>
</svg>
